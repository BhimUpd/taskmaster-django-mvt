<!DOCTYPE html>
<html>
<head>
    <title>Add Task - Lab 4</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Create New Task</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Task Title:</label>
            <input type="text" name="title" required placeholder="e.g. Finish Lab Report">
        </div>
        <div class="form-group">
            <label>Description:</label>
            <textarea name="description" rows="4"></textarea>
        </div>
        <button type="submit">Save Task</button>
    </form>
    <br>
    <a href="{% url 'task_list' %}">Cancel and Go Back</a>
</body>
</html>
